name: CI — Verify Templates

on:
  push:
    branches: [main, gh-pages]
  pull_request:
    branches: [main]

jobs:
  verify-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Verify all Python templates compile
        run: |
          for f in */main.py */bot.py */scraper.py */agent.py */cdp_agent.py */gateway.py */setup.py */rotator.py */solver.py */export_workflow.py; do
            if [ -f "$f" ]; then
              python -m py_compile "$f" && echo "✅ $f" || echo "❌ $f"
            fi
          done
      
      - name: Verify all demos run
        run: |
          for f in */demo.py; do
            if [ -f "$f" ]; then
              timeout 10 python "$f" > /dev/null 2>&1 && echo "✅ $f" || echo "❌ $f"
            fi
          done
      
      - name: Verify READMEs
        run: |
          count=$(find . -maxdepth 2 -name "README.md" | wc -l)
          echo "READMEs: $count"
          if [ "$count" -lt 17 ]; then
            echo "❌ Expected 17 READMEs, got $count"
            exit 1
          fi
          echo "✅ All 17 READMEs present"
      
      - name: Verify requirements.txt
        run: |
          count=$(find . -maxdepth 2 -name "requirements.txt" | wc -l)
          echo "Requirements files: $count"
          if [ "$count" -lt 10 ]; then
            echo "⚠️ Expected 10+ requirements.txt"
          fi
