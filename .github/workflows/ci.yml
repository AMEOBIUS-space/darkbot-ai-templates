name: CI — Verify Templates

on:
  push:
    branches: [main, gh-pages]
  pull_request:
    branches: [main]

jobs:
  verify-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pytest
        run: pip install pytest pytest-cov
      - name: Run all tests
        run: |
          PASS=0; FAIL=0
          for d in */; do
            if [ -d "$d/tests" ]; then
              python -m pytest "$d/tests/" -q --no-header --no-cov 2>&1 && PASS=$((PASS+1)) || FAIL=$((FAIL+1))
            fi
          done
          echo "Test suites: $PASS passed, $FAIL failed"
          if [ "$FAIL" -gt 0 ]; then exit 1; fi
      - name: Verify READMEs
        run: |
          count=$(find . -maxdepth 2 -name "README.md" | wc -l)
          echo "READMEs: $count"
          if [ "$count" -lt 17 ]; then exit 1; fi
      - name: Verify Demos
        run: |
          demo_count=$(find . -maxdepth 2 -name "demo.py" | wc -l)
          echo "Demos: $demo_count"
          if [ "$demo_count" -lt 17 ]; then exit 1; fi
      - name: Summary
        run: |
          echo "=== CI Summary ==="
          echo "Templates: $(find . -maxdepth 1 -type d | tail -n +2 | wc -l)"
          echo "Test suites: $(find . -path '*/tests/test_*.py' | wc -l)"
          echo "Demos: $(find . -maxdepth 2 -name 'demo.py' | wc -l)"
          echo "Dockerfiles: $(find . -maxdepth 2 -name 'Dockerfile' | wc -l)"
          echo "Makefiles: $(find . -maxdepth 2 -name 'Makefile' | wc -l)"
          echo "All checks passed ✅"
